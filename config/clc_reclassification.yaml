# Corine Land Cover 2018 → OECM favourability score mapping
# Score range: 0.0 (unsuitable) to 1.0 (highly suitable)
# Source: EEA CLC 2018 nomenclature
#
# Scoring rationale:
# - Higher scores indicate greater ecological integrity and suitability for OECM designation
# - Natural and semi-natural ecosystems: 0.70–1.00
# - Extensively managed agricultural areas: 0.25–0.60
# - Intensively managed areas: 0.10–0.25
# - Artificial surfaces: 0.00–0.05


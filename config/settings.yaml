# Spatial reference
crs: "EPSG:3035"
resolution_m: 100
resampling_method: "bilinear"  # bilinear | nearest | cubic

# Data paths (relative to project root)
data_dir: "data/"
output_dir: "outputs/"
wdpa_local_path: null  # set to local file path if API unavailable

# WDPA API
wdpa_api_base: "https://api.protectedplanet.net/v3"
wdpa_api_token: null  # set via environment variable WDPA_API_TOKEN

# Logging
log_level: "INFO"  # DEBUG | INFO | WARNING | ERROR

# Interface
default_tab: 0
map_tiles: "OpenStreetMap"

# NUTS2 territorial units
nuts2:
  eurostat_url: "https://gisco-services.ec.europa.eu/distribution/v2/nuts/geojson/NUTS_RG_{scale}_{year}_3035.geojson"
  default_year: 2021
  default_scale: "20M"   # options: 01M, 03M, 10M, 20M, 60M
  default_country: "FR"
  cache_ttl_seconds: 3600

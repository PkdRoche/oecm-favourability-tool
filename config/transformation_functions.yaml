# Transformation function parameters per required layer
# type: linear | sigmoid | gaussian | inverted_linear

ecosystem_condition:
  type: "sigmoid"
  inflection: 0.5
  slope: 5.0   # reduced from 8 — slope 8 mapped 0.3→0.17, 0.4→0.31, compressing realistic range

regulating_es:
  type: "sigmoid"
  inflection: 0.4
  slope: 4.0   # reduced from 6 — softer transition for typical 0.3–0.7 regulating ES values

cultural_es:
  type: "linear"
  vmin: 0.0
  vmax: 1.0
  invert: false

provisioning_es:
  type: "gaussian"
  mean: 0.45      # optimum compatible use level
  std: 0.20       # spread around optimum

anthropogenic_pressure:
  type: "inverted_linear"
  # vmin/vmax derived from data range at runtime
  # values > eliminatory.max_anthropogenic_pressure → Group D mask
